name: Lab QuantStats diagnostics

on:
  workflow_dispatch:

jobs:
  quantstats-diagnostics:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas quantstats

      - name: Generate lab diagnostics artifacts
        run: |
          python tools/generate_quantstats_diagnostics.py \
            --output-dir output \
            --artifact-dir lab_outputs/quantstats

      - name: Upload diagnostics artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: weekly-fx-quantstats-diagnostics
          path: lab_outputs/quantstats
          if-no-files-found: error

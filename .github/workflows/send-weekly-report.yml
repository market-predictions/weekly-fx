name: Send weekly FX report

on:
  push:
    branches:
      - main
    paths:
      - "output/weekly_fx_review_*.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages for PDF rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2 \
            libpango-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fonts-liberation \
            fonts-dejavu-core \
            fonts-lato

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown weasyprint matplotlib

      - name: Refresh FX portfolio state from Twelve Data
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
        run: |
          python refresh_fx_portfolio_state.py
          python tools/apply_fx_carry_accrual.py
          python tools/write_fx_carry_and_risk_snapshots.py

      - name: Validate FX alpha discipline before render
        run: |
          python tools/write_fx_carry_and_risk_snapshots.py --check-only
          python tools/apply_fx_carry_accrual.py --check-only
          python tools/validate_fx_action_discipline.py

      - name: Validate HTML/PDF render before send
        run: |
          python send_fxreport.py --validate-only

      - name: Send email
        env:
          MRKT_RPRTS_SMTP_HOST: ${{ secrets.MRKT_RPRTS_SMTP_HOST }}
          MRKT_RPRTS_SMTP_PORT: ${{ secrets.MRKT_RPRTS_SMTP_PORT }}
          MRKT_RPRTS_SMTP_USER: ${{ secrets.MRKT_RPRTS_SMTP_USER }}
          MRKT_RPRTS_SMTP_PASS: ${{ secrets.MRKT_RPRTS_SMTP_PASS }}
          MRKT_RPRTS_MAIL_FROM: ${{ secrets.MRKT_RPRTS_MAIL_FROM }}
          MRKT_RPRTS_MAIL_TO: ${{ secrets.MRKT_RPRTS_MAIL_TO }}
        run: python send_fxreport.py

      - name: Commit refreshed FX state artifacts back to main
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            output/fx_portfolio_state.json \
            output/fx_valuation_history.csv \
            output/fx_state_refresh_manifest.json \
            output/fx_carry_snapshot.csv \
            output/fx_risk_bucket_snapshot.json || true
          if git diff --cached --quiet; then
            echo "No refreshed FX state artifacts to commit."
            exit 0
          fi
          git commit -m "Persist refreshed Weekly FX state and carry artifacts [skip ci]"
          git push origin HEAD:main

name: Lab vectorbt sleeve-level sandbox

on:
  workflow_dispatch:

jobs:
  vectorbt-sleeve-sandbox:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas vectorbt requests

      - name: Generate sleeve-level vectorbt sandbox artifacts
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          TWELVEDATA_CALLS_PER_MINUTE: "8"
          TWELVEDATA_RATE_LIMIT_WINDOW_SECONDS: "60"
          TWELVEDATA_RATE_LIMIT_BUFFER_SECONDS: "1.0"
        run: |
          python tools/generate_vectorbt_sleeve_sandbox.py \
            --output-dir output \
            --artifact-dir lab_outputs/vectorbt_sleeves \
            --daily-bars 260

      - name: Upload sleeve-level vectorbt artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: weekly-fx-vectorbt-sleeve-sandbox
          path: lab_outputs/vectorbt_sleeves
          if-no-files-found: error
